<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>ASneka 的个人博客 | 首页</title>

    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav">
            <a href="index.html" class="brand-logo">ASneka</a>
            <!-- 导航 -->
            <ul class="nav-list">
                <li><a href="#home" class="nav-link">首页</a></li>
                <li><a href="#articles" class="nav-link">文章</a></li>
                <li><a href="#about" class="nav-link">关于</a></li>
            </ul>
        </nav>
    </header>

    <!-- 页面核心内容区域 -->
    <main>
        <!-- 首页主视觉区域 -->
        <section id="home" class="page-section section-home active">
            <div class="hero-content">
                <h1 class="hero-title">欢迎来到 ASneka 的个人博客</h1>
                <p class="hero-subtitle">分享我的。。。emm...没什么可分享的，欢迎随便看看！</p>
                <a href="articles" class="btn-primary">开始探索</a>
            </div>
        </section>

        <!-- 文章区域 -->
        <section id="articles" class="page-section">
            <h2 class="section-title">最新记录</h2>
            <div class="card-grid">
                <!-- 文章卡片1 -->
                <div class="card">
                    <div class="card-image-placeholder"></div>
                    <h3>第一篇开发日志</h3>
                    <p>yo!开发日志！不知道写什么。。。</p>
                </div>
                <!-- 文章卡片2 -->
                <div class="card">
                    <div class="card-image-placeholder"></div>
                    <h3>CSS布局探索</h3>
                    <p>最近在学习前端呢，虽然我也不知道为什么要学这个，只是感觉很好玩。</p>
                </div>
            </div>
        </section>

        <!-- 关于我区域 -->
        <section id="about" class="page-section section-about">
            <div class="about-card">
                <!-- 头像占位符 -->
                <div class="avatar-placeholder"></div>
                <h2>关于我</h2>
                <p>我是谁，我在哪，我要干什么？</p>
            </div>
        </section>
    </main>

    <!-- 页面页脚区域 -->
    <footer>
        <p>&copy; 2026 ASneka. 保留所有版权.</p>
    </footer>

    <!-- 引入核心 JavaScript 脚本 -->
    <script src="./assets/js/main.js"></script>
</body>
</html>
